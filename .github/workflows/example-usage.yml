# Example: How other projects can use the oxdoc action
# Copy this to your project's .github/workflows/ directory

name: Documentation Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation quality
        uses: jiji-hoon96/oxdoc@main
        with:
          source: './src'
          commands: 'coverage doctest'
          threshold: 80
